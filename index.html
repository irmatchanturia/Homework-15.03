<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form class="form-container">
        <h2>EVENT REGISTRATION FORM</h2>
        <div class="content">
        <div class="row">
            <label for="first-name">Name</label>
            <div class="field">
                <input type="text" id="first-name" required>
                <p class="subtitle">First Name</p>
            </div>
            <div class="field">
                <input type="text" id="last-name" required>
                <p class="subtitle">Last Name</p>
            </div>
        </div>

        <div class="row">
            <label for="company">Company</label>
            <input type="text" id="company" required>
        </div>

        <div class="row">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="example@gmail.com" required>
        </div>  

       <div class="row">
            <label for="area-code">Phone</label>
            <div class="field">
                <input type="number" id="area-code" required>
                <p class="subtitle">Area Code</p>
            </div>
            <div class="field">
                <input type="number" id="phone-number" required>
                <p class="subtitle">Phone Number</p>
            </div>
        </div>

        <div class="row">
            <label for="subject">Subject</label>
            <select name="subject" id="subject" >
                <option selected disabled>Choose Option</option>
            </select>
        </div>

        <div class="row">
            <label for="question" id="question">Are you an existing customer?</label>
            <input type="radio" name="choice"checked> 
            <label class="choice">Yes</label>
            <input type="radio" name="choice">
            <label class="choice">No</label>
         </div>

        <button type="submit">REGISTER</button>
        </div>
    </form>
    
</body>
</html>
